<html lang="en">
<head>

<meta property="og:title" content="Ti81 — Thallium's Mod Library"/>
<meta property="og:description" content="Game mods, reshade presets, engine fixes and curated bundles — all made by Thallium."/>

<link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --c-bg:         #07090f;
  --c-nav:        #04060b;
  --c-sidebar:    #080b14;
  --c-panel:      #0c1020;
  --c-card:       #0e1322;
  --c-card-hover: #111829;

  --c-border:        rgba(255,255,255,0.05);
  --c-border-top:    rgba(140,80,255,0.16);
  --c-border-accent: rgba(0,240,255,0.14);

  --c-hover:  rgba(0,245,255,0.04);
  --c-active: rgba(0,245,255,0.08);

  --c-accent:         #00f0ff;
  --c-accent-dim:     rgba(0,240,255,0.15);
  --c-accent-glow:    rgba(0,240,255,0.45);
  --c-accent-glow-lg: rgba(0,240,255,0.15);

  --c-purple:      #a855f7;
  --c-purple-dim:  rgba(168,85,247,0.15);
  --c-purple-glow: rgba(168,85,247,0.4);

  --c-text:       #d8e4f0;
  --c-text-dim:   #607388;
  --c-text-faint: #283a50;

  --c-reshade:    #00f0ff;
  --c-reshade-bg: rgba(0,240,255,0.06);
  --c-fix:        #a855f7;
  --c-fix-bg:     rgba(168,85,247,0.06);
  --c-bundle:     #f472b6;
  --c-bundle-bg:  rgba(244,114,182,0.06);
  --c-mod:        #34d399;
  --c-mod-bg:     rgba(52,211,153,0.06);

  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 14px;
  --space-lg: 22px;
  --space-xl: 32px;

  --r-sm: 4px;
  --r-md: 8px;
  --r-lg: 12px;

  --t-fast: 0.12s ease;
  --t-mid:  0.22s ease;
  --t-slow: 0.38s ease;

  --f-satoshi: 'Satoshi', sans-serif;
  --f-dmsans:  'DM Sans', sans-serif;
  --f-syne:    'Syne', sans-serif;
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
@media (min-width: 769px) { html, body { overflow:hidden; } }

body {
  font-family: var(--f-dmsans);
  font-size: 13px;
  background: var(--c-bg);
  color: var(--c-text);
  -webkit-font-smoothing: antialiased;
  cursor: default;
}

/* Grain overlay */
body::after {
  content: "";
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999; opacity: 0.35; mix-blend-mode: overlay;
}

/* Progress bar */
.progress-bar {
  position: fixed; top: 0; left: 0; height: 2px; z-index: 10000;
  background: linear-gradient(to right, var(--c-accent), var(--c-purple));
  box-shadow: 0 0 8px var(--c-accent-glow);
  width: 0%; opacity: 0;
  transition: width 0.35s ease, opacity 0.2s ease;
  pointer-events: none;
}
.progress-bar.running { opacity: 1; }
.progress-bar.done { width: 100% !important; opacity: 0; transition: width 0.2s ease, opacity 0.4s ease 0.2s; }

/* ═══════════════════════════════════════════
   KEYFRAMES
═══════════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-12px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 12px rgba(0,240,255,0.3); }
  50%       { box-shadow: 0 0 24px rgba(0,240,255,0.6), 0 0 48px rgba(0,240,255,0.2); }
}
@keyframes countUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes toastOut {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(20px); }
}
@keyframes progressFill {
  0%   { width: 0%; }
  40%  { width: 55%; }
  70%  { width: 78%; }
  100% { width: 100%; }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
@keyframes scanline {
  0%   { transform: translateY(-100%); }
  100% { transform: translateY(100vh); }
}
@keyframes borderGlow {
  0%, 100% { opacity: 0.5; }
  50%       { opacity: 1; }
}

/* ═══════════════════════════════════════════
   PAGE TRANSITION
═══════════════════════════════════════════ */
.page-enter {
  animation: fadeUp 0.32s ease forwards;
}
.page-exit {
  animation: fadeIn 0.15s ease reverse forwards;
  pointer-events: none;
}

/* ═══════════════════════════════════════════
   TOP NAV
═══════════════════════════════════════════ */
.nav {
  height: 44px;
  background: rgba(4,6,11,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0,240,255,0.08);
  display: flex; align-items: center;
  padding: 0 14px;
  flex-shrink: 0;
  position: relative; z-index: 200;
  gap: 2px;
}
/* subtle top shimmer line */
.nav::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right, transparent 5%, rgba(0,240,255,0.22) 30%, rgba(168,85,247,0.18) 60%, transparent 95%);
  pointer-events: none;
}

.nav-hamburger {
  display: none;
  width: 32px; height: 32px;
  align-items: center; justify-content: center;
  background: rgba(0,240,255,0.03);
  border: 1px solid rgba(0,240,255,0.09);
  border-top-color: rgba(0,240,255,0.18);
  border-radius: var(--r-sm); cursor: pointer;
  color: var(--c-text-dim); font-size: 15px;
  transition: background var(--t-fast), color var(--t-fast), box-shadow var(--t-fast);
  flex-shrink: 0; margin-right: 6px;
}
.nav-hamburger:hover { background: rgba(0,240,255,0.09); color: var(--c-accent); box-shadow: 0 0 10px rgba(0,240,255,0.1); }

.brand {
  font-family: var(--f-satoshi);
  font-size: 17px; font-weight: 900;
  color: var(--c-text); letter-spacing: 3px;
  text-transform: uppercase;
  padding-right: 18px; margin-right: 8px;
  border-right: 1px solid rgba(0,240,255,0.1);
  cursor: pointer;
  transition: color var(--t-fast);
  user-select: none; white-space: nowrap;
}
.brand:hover { color: var(--c-accent); }
.brand em {
  color: var(--c-accent); font-style: normal;
  text-shadow: 0 0 14px var(--c-accent-glow), 0 0 32px rgba(0,240,255,0.2);
}

.nav-link {
  height: 44px; padding: 0 14px;
  display: flex; align-items: center;
  font-size: 11px; font-weight: 600;
  color: var(--c-text-dim); cursor: pointer;
  text-transform: uppercase; letter-spacing: 1.2px;
  border-bottom: 2px solid transparent;
  position: relative; top: 1px;
  transition: color var(--t-fast);
  user-select: none; white-space: nowrap;
}
.nav-link:hover { color: var(--c-text); }
.nav-link.active {
  color: var(--c-accent);
  border-bottom-color: var(--c-accent);
  font-weight: 700;
  text-shadow: 0 0 12px var(--c-accent-glow);
}

.nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.nav-pill {
  font-family: var(--f-syne);
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  padding: 3px 10px; border-radius: 20px;
  color: var(--c-mod);
  background: rgba(52,211,153,0.07);
  border: 1px solid rgba(52,211,153,0.2);
  text-shadow: 0 0 8px rgba(52,211,153,0.4);
  white-space: nowrap;
}

/* ═══════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════ */
.app-shell { display: flex; height: calc(100vh - 44px); position: relative; }
@media (max-width: 768px) { .app-shell { height: auto; min-height: calc(100vh - 44px); } }

/* ═══════════════════════════════════════════
   SIDEBAR BACKDROP
═══════════════════════════════════════════ */
.sidebar-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 299;
  opacity: 0; transition: opacity 0.25s ease;
  pointer-events: none; backdrop-filter: blur(2px);
}
.sidebar-backdrop.visible { opacity: 1; pointer-events: all; }

/* ═══════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════ */
.sidebar {
  width: 224px; flex-shrink: 0;
  background: var(--c-sidebar);
  border-right: 1px solid rgba(0,0,0,0.5);
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: width var(--t-mid), opacity var(--t-mid), transform 0.28s ease;
}
.sidebar.hidden { width: 0; opacity: 0; pointer-events: none; }

@media (max-width: 768px) {
  .sidebar {
    position: fixed; top: 44px; left: 0; bottom: 0;
    width: 260px !important; z-index: 300;
    transform: translateX(-100%);
    opacity: 1 !important; pointer-events: none;
    transition: transform 0.28s cubic-bezier(0.22,1,0.36,1);
  }
  .sidebar.mobile-open { transform: translateX(0); pointer-events: all; }
  .sidebar.hidden { width: 260px !important; opacity: 1 !important; }
  .sidebar-backdrop { display: block; }
}

.sidebar-search { padding: 10px 10px 8px; border-bottom: 1px solid rgba(0,240,255,0.05); flex-shrink: 0; }
.search-wrap {
  display: flex; align-items: center; gap: 7px;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(0,240,255,0.07);
  border-top-color: rgba(0,240,255,0.14);
  border-radius: var(--r-sm); padding: 0 10px;
  transition: border-color var(--t-fast), box-shadow var(--t-fast);
}
.search-wrap:focus-within {
  border-color: rgba(0,240,255,0.36);
  box-shadow: 0 0 0 1px rgba(0,240,255,0.05), 0 0 14px rgba(0,240,255,0.07);
}
.search-wrap svg { opacity: 0.35; flex-shrink: 0; }
.search-wrap input {
  background: none; border: none; outline: none;
  color: var(--c-text); font-family: var(--f-dmsans);
  font-size: 11.5px; padding: 7px 0; width: 100%;
}
.search-wrap input::placeholder { color: var(--c-text-faint); }

.sidebar-section-label {
  padding: 13px 13px 5px;
  font-family: var(--f-syne); font-size: 9px; font-weight: 700;
  color: var(--c-text-faint); text-transform: uppercase; letter-spacing: 1.8px;
  flex-shrink: 0;
}

.game-list { flex: 1; overflow-y: auto; padding-bottom: 10px; }
.game-list::-webkit-scrollbar { width: 3px; }
.game-list::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.08); border-radius: 2px; }

.game-row {
  padding: 6px 10px; min-height: 38px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; color: var(--c-text-dim);
  transition: background-color var(--t-fast), color var(--t-fast);
  margin: 1px 5px; border-radius: var(--r-sm);
  animation: slideInLeft 0.24s ease forwards;
  opacity: 0;
}
.game-row:hover { background: rgba(0,240,255,0.04); color: var(--c-text); }
.game-row.active {
  background: rgba(0,240,255,0.07);
  color: var(--c-accent);
  box-shadow: inset 2px 0 0 var(--c-accent), inset 0 0 22px rgba(0,240,255,0.02);
  text-shadow: 0 0 8px rgba(0,240,255,0.28);
}
.game-row.active .game-row-icon { border-color: rgba(0,240,255,0.3); box-shadow: 0 0 10px rgba(0,240,255,0.18); }
.game-row-icon {
  width: 26px; height: 26px; flex-shrink: 0;
  border-radius: 5px; overflow: hidden;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(0,240,255,0.06);
  transition: border-color var(--t-fast), box-shadow var(--t-fast);
}
.game-row-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
.game-row-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.game-row-count {
  margin-left: auto; font-size: 9px; font-weight: 700;
  color: var(--c-text-faint); flex-shrink: 0;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
  border-radius: 10px; padding: 1px 6px;
  transition: background var(--t-fast), color var(--t-fast), border-color var(--t-fast);
}
.game-row.active .game-row-count {
  color: var(--c-accent); background: rgba(0,240,255,0.07); border-color: rgba(0,240,255,0.15);
}

/* ═══════════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════════ */
.main {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  background: var(--c-bg);
  display: flex; flex-direction: column;
  position: relative; min-width: 0;
}
.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.06); border-radius: 3px; }
.main::-webkit-scrollbar-thumb:hover { background: rgba(0,240,255,0.12); }

@media (max-width: 768px) { .main { overflow: visible; width: 100%; } }

/* ═══════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════ */
.empty-state { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 300px; }
.empty-inner { text-align: center; padding: var(--space-xl); animation: fadeUp 0.4s ease; }
.empty-inner .empty-icon { font-size: 36px; opacity: 0.08; margin-bottom: 20px; display: block; }
.empty-inner h2 { font-family: var(--f-syne); font-weight: 700; font-size: 15px; color: var(--c-text-dim); margin-bottom: 6px; }
.empty-inner p { font-size: 12px; color: var(--c-text-faint); line-height: 1.7; }

/* ═══════════════════════════════════════════
   HERO
═══════════════════════════════════════════ */
.hero-ambient {
  position: sticky; top: 0; left: 0;
  width: 100%; height: 0; flex-shrink: 0;
  z-index: 0; pointer-events: none; overflow: visible;
}
.hero-ambient::after {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 100vh;
  background-image: var(--hero-src);
  background-size: cover; background-position: center 20%;
  filter: blur(60px) brightness(0.13) saturate(3) hue-rotate(210deg);
  -webkit-mask-image: linear-gradient(to bottom, black 0%, black 40%, rgba(0,0,0,0.35) 70%, transparent 100%);
  mask-image: linear-gradient(to bottom, black 0%, black 40%, rgba(0,0,0,0.35) 70%, transparent 100%);
}

.hero-wrap {
  position: relative; flex-shrink: 0; height: 320px;
  display: flex; flex-direction: column; justify-content: flex-end;
  z-index: 1; will-change: transform;
  overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center 20%;
  animation: kenBurns 18s ease-in-out infinite alternate;
}
@keyframes kenBurns {
  from { transform: scale(1); }
  to   { transform: scale(1.04); }
}
.hero-bg::before {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(to right, rgba(7,9,15,0.9) 0%, transparent 35%),
              linear-gradient(to left,  rgba(7,9,15,0.9) 0%, transparent 35%);
  z-index: 1;
}
.hero-bg::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 25%, rgba(7,9,15,0.7) 65%, rgba(7,9,15,1) 100%);
  z-index: 1;
}
.hero-title-area { position: relative; z-index: 2; padding: 0 var(--space-lg) 20px; animation: fadeUp 0.5s ease; }
.hero-logo {
  max-height: 76px; max-width: 300px; width: auto; object-fit: contain;
  filter: drop-shadow(0 2px 20px rgba(0,0,0,0.98)) drop-shadow(0 0 26px rgba(0,240,255,0.16));
  display: block;
}
.hero-game-title {
  font-family: var(--f-syne); font-size: 26px; font-weight: 800; color: #fff;
  letter-spacing: 0.4px;
  text-shadow: 0 2px 24px rgba(0,0,0,0.98), 0 0 44px rgba(0,240,255,0.18);
  line-height: 1.1;
}

@media (max-width: 768px) {
  .hero-wrap { height: 220px; will-change: auto; }
  .hero-logo { max-height: 52px; max-width: 200px; }
  .hero-game-title { font-size: 20px; }
}

/* ═══════════════════════════════════════════
   GAME PANEL
═══════════════════════════════════════════ */
.game-panel {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  background: var(--c-bg);
  border-top: 1px solid rgba(0,240,255,0.12);
  box-shadow: 0 -1px 32px rgba(0,240,255,0.04);
}

.action-bar {
  height: 54px; padding: 0 var(--space-lg);
  display: flex; align-items: center;
  border-bottom: 1px solid rgba(0,240,255,0.05);
  flex-shrink: 0; overflow-x: auto; gap: 0;
}
.action-bar::-webkit-scrollbar { display: none; }

.stat-block { display: flex; align-items: center; gap: 10px; padding: 0 20px; border-right: 1px solid rgba(0,240,255,0.05); flex-shrink: 0; }
.stat-block:first-child { padding-left: 0; }
.stat-block:last-of-type { border-right: none; }
.stat-icon { font-size: 14px; opacity: 0.18; flex-shrink: 0; }
.stat-col { display: flex; flex-direction: column; gap: 1px; }
.stat-label { font-family: var(--f-syne); font-size: 8.5px; font-weight: 700; color: var(--c-text-faint); text-transform: uppercase; letter-spacing: 1.4px; line-height: 1; }
.stat-value { font-size: 12px; font-weight: 500; color: var(--c-text); line-height: 1.5; }
.stat-value.accent { color: var(--c-accent); text-shadow: 0 0 10px var(--c-accent-glow); }
.stat-value.good { color: var(--c-mod); text-shadow: 0 0 10px rgba(52,211,153,0.4); }

.bar-actions { margin-left: auto; display: flex; gap: 4px; flex-shrink: 0; }
.icon-btn {
  width: 30px; height: 30px; border-radius: var(--r-sm);
  background: rgba(0,240,255,0.03);
  border: 1px solid rgba(0,240,255,0.09);
  border-top-color: rgba(0,240,255,0.18);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: var(--c-text-dim);
  transition: background var(--t-fast), color var(--t-fast), box-shadow var(--t-fast), transform var(--t-fast);
}
.icon-btn:hover { background: rgba(0,240,255,0.09); color: var(--c-accent); box-shadow: 0 0 12px rgba(0,240,255,0.14); transform: translateY(-1px); }

/* ── Tabs ── */
.tab-bar {
  height: 44px; padding: 0 var(--space-lg);
  display: flex; align-items: center; gap: 2px;
  border-bottom: 1px solid rgba(0,240,255,0.05);
  flex-shrink: 0; overflow-x: auto; position: relative;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab {
  height: 44px; padding: 0 14px;
  display: flex; align-items: center;
  font-size: 11px; font-weight: 600; color: var(--c-text-dim);
  text-transform: uppercase; letter-spacing: 0.9px; cursor: pointer;
  border-bottom: 2px solid transparent; position: relative; top: 1px;
  transition: color var(--t-fast); user-select: none; white-space: nowrap;
}
.tab:hover { color: var(--c-text); }
.tab.active { color: var(--c-accent); border-bottom-color: var(--c-accent); font-weight: 700; text-shadow: 0 0 10px var(--c-accent-glow); }
/* Coming soon tooltip for inactive tabs */
.tab[data-soon] { position: relative; }
.tab[data-soon]:not(.active)::after {
  content: "Coming Soon";
  position: absolute; top: calc(100% + 10px); left: 50%; transform: translateX(-50%) translateY(-4px);
  background: var(--c-panel); border: 1px solid rgba(0,240,255,0.12);
  color: var(--c-text-faint); font-size: 9px; letter-spacing: 0.5px;
  padding: 4px 8px; border-radius: var(--r-sm); white-space: nowrap;
  pointer-events: none; opacity: 0; transition: opacity 0.15s ease, transform 0.15s ease;
  z-index: 50;
}
.tab[data-soon]:not(.active):hover::after { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Content body ── */
.content-body {
  display: flex; align-items: flex-start;
  gap: var(--space-lg);
  padding: var(--space-lg) var(--space-lg) var(--space-xl);
}
.mods-col { flex: 1; display: flex; flex-direction: column; gap: var(--space-sm); min-width: 0; }
.section-label {
  font-family: var(--f-syne); font-size: 9px; font-weight: 700;
  color: var(--c-text-faint); text-transform: uppercase; letter-spacing: 1.6px;
  margin-bottom: var(--space-xs); padding-bottom: var(--space-sm);
  border-bottom: 1px solid rgba(0,240,255,0.05);
}

@media (max-width: 860px) {
  .content-body { flex-direction: column-reverse; padding: var(--space-md) var(--space-md) var(--space-xl); }
  .filter-col { width: 100% !important; position: static !important; }
  .filter-panel { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  .filter-row { border-bottom: none !important; border-right: 1px solid rgba(0,0,0,0.25); }
}
@media (max-width: 480px) {
  .content-body { padding: var(--space-sm) var(--space-sm) var(--space-xl); }
  .filter-panel { grid-template-columns: repeat(2, 1fr); }
  .action-bar { padding: 0 var(--space-md); height: auto; min-height: 48px; flex-wrap: wrap; padding-top: 8px; padding-bottom: 8px; }
  .stat-block { padding: 4px 12px; min-height: 36px; }
  .stat-block.hide-xs { display: none; }
}

/* ═══════════════════════════════════════════
   MOD CARD
═══════════════════════════════════════════ */
.mod-card {
  display: flex;
  background: var(--c-card);
  border: 1px solid rgba(0,240,255,0.05);
  border-top-color: rgba(140,80,255,0.1);
  border-radius: var(--r-md);
  overflow: hidden;
  transition: border-color var(--t-mid), box-shadow var(--t-mid), transform 0.18s ease, background var(--t-mid);
  cursor: default; position: relative; min-height: 130px;
  opacity: 0;
  animation: fadeUp 0.38s ease forwards;
}
.mod-card:hover {
  border-color: rgba(0,240,255,0.2);
  border-top-color: rgba(140,80,255,0.32);
  box-shadow: 0 0 40px rgba(0,240,255,0.06), 0 10px 28px rgba(0,0,0,0.6);
  transform: translateY(-2px);
  background: var(--c-card-hover);
}
@media (hover: none) { .mod-card:hover { transform: none; } }

.mod-img-panel { width: 124px; flex-shrink: 0; position: relative; overflow: hidden; }
.mod-img-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center 20%;
  filter: brightness(0.42) saturate(1.4);
  transition: filter 0.3s ease, transform 0.4s ease;
}
.mod-card:hover .mod-img-bg { filter: brightness(0.58) saturate(1.7); transform: scale(1.07); }
.mod-img-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to right, transparent 35%, rgba(14,19,34,1) 100%),
              linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, transparent 30%, rgba(0,0,0,0.25) 100%);
}
.mod-img-panel::before {
  content: "";
  position: absolute; top: 0; left: 0; bottom: 0; width: 2px;
  background: var(--mod-accent-color, var(--c-accent));
  box-shadow: 0 0 12px var(--mod-accent-color, var(--c-accent));
  z-index: 2; opacity: 0.65;
  transition: opacity var(--t-fast);
  animation: borderGlow 2.5s ease-in-out infinite;
}
.mod-card:hover .mod-img-panel::before { opacity: 1; }
.mod-emoji {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; z-index: 3;
  filter: drop-shadow(0 2px 10px rgba(0,0,0,0.9));
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.mod-card:hover .mod-emoji { transform: scale(1.12); }

@media (max-width: 480px) {
  .mod-img-panel { width: 72px; }
  .mod-emoji { font-size: 20px; }
}

.mod-body {
  flex: 1; display: flex; flex-direction: column;
  padding: 16px 18px 14px; gap: 0; min-width: 0;
}
.mod-header-row {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 10px; margin-bottom: 8px;
}
.mod-title-block { flex: 1; min-width: 0; }
.mod-meta-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.mod-meta { font-size: 9px; font-weight: 600; color: var(--c-text-faint); text-transform: uppercase; letter-spacing: 1px; }
.mod-version {
  font-family: var(--f-syne); font-size: 8.5px; font-weight: 700;
  letter-spacing: 0.5px; padding: 1px 6px; border-radius: 4px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
  color: var(--c-text-faint);
}
.mod-title { font-size: 14px; font-weight: 700; color: var(--c-text); line-height: 1.25; letter-spacing: 0.1px; }
.mod-tag-inline { flex-shrink: 0; margin-top: 2px; }
.mod-desc { font-size: 11.5px; color: var(--c-text-dim); line-height: 1.72; flex: 1; }

.mod-includes { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.mod-includes-label {
  font-family: var(--f-syne); font-size: 8px; font-weight: 700;
  color: var(--c-text-faint); text-transform: uppercase; letter-spacing: 1px;
  width: 100%; margin-bottom: 2px;
}
.mod-include-tag {
  font-size: 9.5px; font-weight: 500; padding: 2px 8px; border-radius: 20px;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  color: var(--c-text-dim);
}

.mod-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 13px; padding-top: 11px;
  border-top: 1px solid rgba(0,240,255,0.05);
}
.mod-footer-meta { display: flex; align-items: center; gap: 14px; }

@media (max-width: 480px) {
  .mod-body { padding: 12px 12px 10px; }
  .mod-title { font-size: 13px; }
  .mod-desc { font-size: 11px; }
  .mod-tag-inline { display: none; }
}

/* Tags */
.mod-tag {
  font-family: var(--f-syne); font-size: 8.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.9px; padding: 3px 9px; border-radius: 20px;
}
.tag-reshade { color: var(--c-reshade); background: var(--c-reshade-bg); border: 1px solid rgba(0,240,255,0.18); text-shadow: 0 0 8px rgba(0,240,255,0.45); }
.tag-fix     { color: var(--c-fix);     background: var(--c-fix-bg);     border: 1px solid rgba(168,85,247,0.18); text-shadow: 0 0 8px rgba(168,85,247,0.45); }
.tag-bundle  { color: var(--c-bundle);  background: var(--c-bundle-bg);  border: 1px solid rgba(244,114,182,0.18); text-shadow: 0 0 8px rgba(244,114,182,0.45); }
.tag-mod     { color: var(--c-mod);     background: var(--c-mod-bg);     border: 1px solid rgba(52,211,153,0.18); text-shadow: 0 0 8px rgba(52,211,153,0.45); }

/* Download button */
.btn-download {
  background: linear-gradient(to bottom, rgba(0,240,255,0.14) 0%, rgba(0,240,255,0.06) 100%);
  color: var(--c-accent);
  border: 1px solid rgba(0,240,255,0.28);
  border-top-color: rgba(0,240,255,0.46);
  padding: 6px 18px; border-radius: 20px;
  font-family: var(--f-syne); font-size: 9.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.9px; cursor: pointer;
  box-shadow: 0 0 14px rgba(0,240,255,0.08), inset 0 1px 0 rgba(0,240,255,0.08);
  transition: box-shadow var(--t-fast), background var(--t-fast), transform var(--t-fast), border-color var(--t-fast);
  text-shadow: 0 0 10px rgba(0,240,255,0.5);
  display: flex; align-items: center; gap: 6px;
  position: relative; overflow: hidden;
}
.btn-download::before { content: "↓"; font-size: 11px; font-weight: 700; }
.btn-download::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(0,240,255,0.15) 50%, transparent 60%);
  transform: translateX(-100%); transition: transform 0.45s ease;
}
.btn-download:hover::after { transform: translateX(100%); }
.btn-download:hover {
  background: linear-gradient(to bottom, rgba(0,240,255,0.24) 0%, rgba(0,240,255,0.11) 100%);
  box-shadow: 0 0 22px rgba(0,240,255,0.25), 0 0 8px rgba(0,240,255,0.12);
  transform: translateY(-1px);
  border-color: rgba(0,240,255,0.44);
}
.btn-download:active { transform: translateY(0); }
@media (hover: none) { .btn-download:hover { transform: none; } }

.no-results { color: var(--c-text-dim); font-size: 12px; padding: 32px 0; text-align: center; animation: fadeIn 0.3s ease; }

/* ── Filter column ── */
.filter-col { width: 195px; flex-shrink: 0; position: sticky; top: var(--space-lg); }
.filter-label {
  font-family: var(--f-syne); font-size: 9px; font-weight: 700;
  color: var(--c-text-faint); text-transform: uppercase; letter-spacing: 1.6px;
  margin-bottom: var(--space-sm); padding-bottom: var(--space-sm);
  border-bottom: 1px solid rgba(0,240,255,0.05);
}
.filter-panel {
  background: var(--c-panel); border: 1px solid rgba(0,240,255,0.07);
  border-top-color: rgba(140,80,255,0.16); border-radius: var(--r-md);
  overflow: hidden; box-shadow: 0 4px 28px rgba(0,0,0,0.45);
}
.filter-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 13px; cursor: pointer; color: var(--c-text-dim);
  font-size: 12px; font-weight: 500;
  border-bottom: 1px solid rgba(0,0,0,0.25);
  transition: background var(--t-fast), color var(--t-fast), padding-left var(--t-mid);
  user-select: none;
}
.filter-row:last-child { border-bottom: none; }
.filter-row:hover { background: rgba(0,240,255,0.04); color: var(--c-text); padding-left: 16px; }
.filter-row.active { color: var(--c-accent); background: rgba(0,240,255,0.05); text-shadow: 0 0 8px rgba(0,240,255,0.25); padding-left: 16px; }
.filter-icon { font-size: 13px; opacity: 0.5; flex-shrink: 0; }
.filter-row.active .filter-icon { opacity: 1; }
.filter-count {
  margin-left: auto; font-size: 10px; color: var(--c-text-faint); font-weight: 500;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05);
  border-radius: 10px; padding: 1px 7px;
  transition: color var(--t-fast), background var(--t-fast), border-color var(--t-fast);
}
.filter-row.active .filter-count { color: var(--c-accent); background: rgba(0,240,255,0.07); border-color: rgba(0,240,255,0.15); }

/* ═══════════════════════════════════════════
   HOME PAGE
═══════════════════════════════════════════ */
.home-page {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column; position: relative;
}
.home-page::-webkit-scrollbar { width: 4px; }
.home-page::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.06); border-radius: 3px; }
@media (max-width: 768px) { .home-page { overflow: visible; } }

/* Animated grid background */
.home-page::before {
  content: ""; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,240,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,240,255,0.02) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none; z-index: 0;
  animation: gridPulse 8s ease-in-out infinite;
}
@keyframes gridPulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.55; }
}

.home-glow {
  position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
  width: 760px; height: 460px;
  background: radial-gradient(ellipse at center,
    rgba(0,240,255,0.07) 0%, rgba(168,85,247,0.05) 45%, transparent 70%);
  pointer-events: none; z-index: 0;
  animation: glowPulse 6s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.8; transform: translateX(-50%) scale(1); }
  50%       { opacity: 1; transform: translateX(-50%) scale(1.06); }
}

.home-hero {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center;
  padding: 88px var(--space-xl) 68px; flex-shrink: 0;
}
@media (max-width: 600px) { .home-hero { padding: 56px var(--space-lg) 44px; } }

.home-eyebrow {
  font-family: var(--f-syne); font-size: 9px; font-weight: 700;
  color: var(--c-accent); text-transform: uppercase; letter-spacing: 3.5px;
  margin-bottom: 22px; text-shadow: 0 0 14px var(--c-accent-glow);
  display: flex; align-items: center; gap: 12px;
  animation: fadeUp 0.5s ease 0.05s both;
}
.home-eyebrow::before, .home-eyebrow::after {
  content: ""; width: 32px; height: 1px;
  background: linear-gradient(to right, transparent, var(--c-accent)); opacity: 0.45;
}
.home-eyebrow::after { background: linear-gradient(to left, transparent, var(--c-accent)); }

.home-title {
  font-family: var(--f-syne);
  font-size: clamp(30px,7vw,54px); font-weight: 800;
  line-height: 1.0; letter-spacing: -0.5px; color: var(--c-text);
  margin-bottom: 10px;
  animation: fadeUp 0.5s ease 0.1s both;
}
.home-title em {
  font-style: normal; color: var(--c-accent);
  text-shadow: 0 0 36px var(--c-accent-glow), 0 0 70px rgba(0,240,255,0.18);
  background: linear-gradient(135deg, #00f0ff 0%, #60efff 50%, #00c4cc 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.home-subtitle {
  font-size: clamp(12px,2vw,14px); font-weight: 400;
  color: var(--c-text-dim); max-width: 420px;
  line-height: 1.75; margin-bottom: 40px;
  animation: fadeUp 0.5s ease 0.15s both;
}

.home-cta-row {
  display: flex; align-items: center; gap: 12px;
  flex-wrap: wrap; justify-content: center;
  animation: fadeUp 0.5s ease 0.2s both;
}

.btn-primary {
  background: linear-gradient(to bottom, rgba(0,240,255,0.18) 0%, rgba(0,240,255,0.09) 100%);
  color: var(--c-accent); border: 1px solid rgba(0,240,255,0.38); border-top-color: rgba(0,240,255,0.6);
  padding: 11px 32px; border-radius: 30px;
  font-family: var(--f-syne); font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.6px; cursor: pointer;
  box-shadow: 0 0 24px rgba(0,240,255,0.15), inset 0 1px 0 rgba(0,240,255,0.1);
  transition: box-shadow var(--t-fast), background var(--t-fast), transform var(--t-fast);
  text-shadow: 0 0 12px rgba(0,240,255,0.6);
  user-select: none; position: relative; overflow: hidden;
}
.btn-primary::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(0,240,255,0.18) 50%, transparent 60%);
  transform: translateX(-100%); transition: transform 0.55s ease;
}
.btn-primary:hover::after { transform: translateX(100%); }
.btn-primary:hover {
  background: linear-gradient(to bottom, rgba(0,240,255,0.28) 0%, rgba(0,240,255,0.15) 100%);
  box-shadow: 0 0 40px rgba(0,240,255,0.32), 0 0 16px rgba(0,240,255,0.16);
  transform: translateY(-1px);
}
.btn-primary:active { transform: translateY(0); }
@media (hover: none) { .btn-primary:hover { transform: none; } }

.btn-ghost {
  color: var(--c-text-dim); border: 1px solid rgba(255,255,255,0.08); border-top-color: rgba(255,255,255,0.13);
  padding: 11px 22px; border-radius: 30px;
  font-family: var(--f-syne); font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.6px; cursor: pointer;
  background: rgba(255,255,255,0.025);
  transition: background var(--t-fast), color var(--t-fast), border-color var(--t-fast), transform var(--t-fast);
  user-select: none;
}
.btn-ghost:hover { background: rgba(255,255,255,0.055); color: var(--c-text); border-color: rgba(255,255,255,0.14); transform: translateY(-1px); }

/* Divider */
.home-divider {
  position: relative; z-index: 1;
  display: flex; align-items: center; gap: 16px;
  padding: 0 var(--space-xl); margin-bottom: 20px; flex-shrink: 0;
}
.home-divider-label {
  font-family: var(--f-syne); font-size: 9px; font-weight: 700;
  color: var(--c-text-faint); text-transform: uppercase; letter-spacing: 2px; white-space: nowrap;
}
.home-divider-line { flex: 1; height: 1px; background: linear-gradient(to right, rgba(0,240,255,0.1), transparent); }
.home-divider-dots { display: flex; align-items: center; gap: 6px; margin-left: 4px; }
.home-divider-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--c-text-faint); cursor: pointer;
  transition: background 0.22s ease, box-shadow 0.22s ease, transform 0.22s cubic-bezier(0.34,1.56,0.64,1), width 0.22s ease;
}
.home-divider-dot.active {
  background: var(--c-accent); box-shadow: 0 0 10px var(--c-accent-glow);
  transform: scale(1.3); width: 14px; border-radius: 3px;
}

/* Game grid */
.home-games-wrap { position: relative; z-index: 1; padding: 0 var(--space-xl) var(--space-xl); flex-shrink: 0; }
.home-games {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  transition: opacity 0.35s ease;
}
.home-games.fading { opacity: 0; }

@media (max-width: 860px) { .home-games { grid-template-columns: repeat(2, 1fr); } .home-games-wrap { padding: 0 var(--space-lg) var(--space-lg); } }
@media (max-width: 520px) { .home-games { grid-template-columns: 1fr; } .home-games-wrap { padding: 0 var(--space-md) var(--space-md); } .home-divider { padding: 0 var(--space-md); } }

.home-game-card {
  position: relative; border-radius: var(--r-md); overflow: hidden;
  border: 1px solid rgba(0,240,255,0.06); border-top-color: rgba(140,80,255,0.12);
  background: var(--c-card); cursor: pointer;
  transition: transform 0.22s cubic-bezier(0.22,1,0.36,1), box-shadow 0.22s ease, border-color 0.22s ease;
  aspect-ratio: 16 / 7;
  animation: fadeUp 0.4s ease both;
}
.home-game-card:hover {
  transform: translateY(-4px) scale(1.018);
  box-shadow: 0 16px 48px rgba(0,0,0,0.75), 0 0 28px rgba(0,240,255,0.1);
  border-color: rgba(0,240,255,0.22); border-top-color: rgba(140,80,255,0.34);
}
@media (hover: none) { .home-game-card:hover { transform: none; } }
.home-game-card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: transform 0.5s ease; }
.home-game-card:hover .home-game-card-bg { transform: scale(1.06); }
.home-game-card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(7,9,15,0.05) 0%, rgba(7,9,15,0.5) 55%, rgba(7,9,15,0.97) 100%);
}
.home-game-card-body { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 14px; z-index: 1; }
.home-game-card-name {
  font-family: var(--f-syne); font-size: 13px; font-weight: 700; color: #fff;
  text-shadow: 0 1px 8px rgba(0,0,0,0.95); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.home-game-card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.home-game-card-chip {
  font-family: var(--f-syne); font-size: 8px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px; padding: 2px 7px; border-radius: 20px;
  background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.42);
}
.home-game-card-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--c-accent); box-shadow: 0 0 7px var(--c-accent-glow); flex-shrink: 0; }
.home-game-card-count { font-size: 10px; color: rgba(255,255,255,0.35); }

/* Stats strip */
.home-stats-strip {
  position: relative; z-index: 1;
  display: flex; align-items: stretch; flex-wrap: wrap;
  border-top: 1px solid rgba(0,240,255,0.05); border-bottom: 1px solid rgba(0,240,255,0.05);
  margin-bottom: 44px; flex-shrink: 0;
  background: rgba(0,0,0,0.2);
}
.home-stat {
  flex: 1; min-width: 90px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 22px 12px;
  border-right: 1px solid rgba(0,240,255,0.05); gap: 5px;
  cursor: default;
}
.home-stat:last-child { border-right: none; }
.home-stat-val {
  font-family: var(--f-syne); font-size: clamp(22px,4vw,30px); font-weight: 800;

  _pbTimer = setInterval(() => {

function finishProgress() {
  clearInterval(_pbTimer);

        <div class="dl-ready" id="dlReady">
          <div class="dl-ready-icon">✓</div>
          <div class="dl-ready-text">File verified and ready. Your download will begin when you confirm.</div>
          <button class="btn-dl-confirm" id="dlConfirm">Confirm Download</button>
        </div>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  const stages = [
    [20, 'Verifying integrity…'],
    [45, 'Resolving file host…'],
    [70, 'Preparing package…'],
    [90, 'Almost ready…'],
    [100, 'Ready.'],
  ];
  let stageIdx = 0;
  const fill = overlay.querySelector('#dlFill');
  const pct  = overlay.querySelector('#dlPct');
  const stat = overlay.querySelector('#dlStatus');

  const iv = setInterval(() => {
    if (stageIdx >= stages.length) { clearInterval(iv); return; }
    const [p, msg] = stages[stageIdx++];
    fill.style.width = p + '%';
    pct.textContent = p + '%';
    stat.textContent = msg;
    if (p === 100) {
      clearInterval(iv);
      setTimeout(() => {
        overlay.querySelector('#dlProgressWrap').style.display = 'none';
        overlay.querySelector('#dlReady').classList.add('visible');
      }, 400);
    }
  }, 480);

  function closeModal() {
    overlay.classList.add('hiding');
    setTimeout(() => overlay.remove(), 180);
  }

  overlay.querySelector('#modalClose').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { closeModal(); document.removeEventListener('keydown', esc); }
  });
  overlay.querySelector('#dlConfirm').addEventListener('click', () => {
    closeModal();
    showToast('✅', `<strong>${mod.title}</strong> download started`);
  });
}

/* ── Count-up animation ── */
function initCountUp() {
  const els = document.querySelectorAll('[data-target]');
  if (!els.length) return;
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const el = e.target;
      const target = parseInt(el.dataset.target, 10);
      let start = 0;
      const duration = 900;
      const step = timestamp => {
        if (!start) start = timestamp;
        const prog = Math.min((timestamp - start) / duration, 1);
        const ease = 1 - Math.pow(1 - prog, 3);
        el.textContent = Math.round(ease * target);
        if (prog < 1) requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
      io.unobserve(el);
    });
  }, { threshold: 0.5 });
  els.forEach(el => io.observe(el));
}

/* ═══════════════════════════════════════════
   ROUTER
═══════════════════════════════════════════ */
let _rotationTimer = null;

function navigate(page, gameId = null) {
  showProgress();
  state.page = page;
  clearInterval(_rotationTimer);
  closeSidebarDrawer();

  document.querySelectorAll('.nav-link').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  document.getElementById('mainNav').classList.toggle('library-mode', page === 'library');

  const sidebar  = document.getElementById('sidebar');
  const mainArea = document.getElementById('mainArea');

  setTimeout(() => {
    if (page === 'library') {
      sidebar.classList.remove('hidden');
      mainArea.className = 'main';
      mainArea.style.cssText = '';
      if (gameId) { state.activeGameId = gameId; state.activeFilter = 'all'; }
      renderSidebar();
      const game = getGame(state.activeGameId);
      mainArea.innerHTML = game ? renderGameView(game) : renderLibraryEmpty();
    } else {
      sidebar.classList.add('hidden');
      mainArea.className = 'main';
      mainArea.style.cssText = 'flex:1; overflow:hidden; display:flex; flex-direction:column;';
      if (page === 'home')  { mainArea.innerHTML = renderHome(); initHomeRotation(); initCountUp(); }
      if (page === 'about') mainArea.innerHTML = renderAbout();
    }
    finishProgress();
  }, 60);
}

/* ═══════════════════════════════════════════
   HOME ROTATION
═══════════════════════════════════════════ */
function initHomeRotation() {
  clearInterval(_rotationTimer);
  const grid  = document.getElementById('homeGamesGrid');
  const dotsEl = document.getElementById('homeDots');
  if (!grid || GAMES.length <= 3) return;

  let currentOffset = 0;
  const total = GAMES.length;

  function getSlice(offset) { return [0,1,2].map(i => GAMES[(offset+i) % total]); }

  function updateDots(offset) {
    if (!dotsEl) return;
    dotsEl.querySelectorAll('.home-divider-dot').forEach((d,i) => {
      d.classList.toggle('active', i === offset % total);
    });
  }

  function rotateTo(offset, instant) {
    currentOffset = ((offset % total) + total) % total;
    if (instant) { grid.innerHTML = getSlice(currentOffset).map((g,i) => buildGameCard(g,i)).join(''); updateDots(currentOffset); return; }
    grid.classList.add('fading');
    setTimeout(() => {
      grid.innerHTML = getSlice(currentOffset).map((g,i) => buildGameCard(g,i)).join('');
      updateDots(currentOffset); grid.classList.remove('fading');
    }, 350);
  }

  if (dotsEl) {
    dotsEl.addEventListener('click', e => {
      const dot = e.target.closest('[data-dot]');
      if (!dot) return;
      clearInterval(_rotationTimer);
      rotateTo(parseInt(dot.dataset.dot));
      _rotationTimer = setInterval(() => rotateTo(currentOffset + 1), 4200);
    });
  }

  _rotationTimer = setInterval(() => rotateTo(currentOffset + 1), 4200);
  updateDots(0);
}

/* ═══════════════════════════════════════════
   PARALLAX
═══════════════════════════════════════════ */
function initParallax() {
  document.getElementById('mainArea').addEventListener('scroll', function() {
    if (isMobile()) return;
    const hero = this.querySelector('.hero-wrap');
    if (hero) hero.style.transform = `translateY(${this.scrollTop * 0.32}px)`;
  }, { passive: true });
}

/* ═══════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════ */
function initEvents() {
  // Nav links
  document.querySelectorAll('.nav-link').forEach(el => {
    el.addEventListener('click', () => navigate(el.dataset.page));
  });

  // Brand
  document.getElementById('brandLink').addEventListener('click', () => navigate('home'));

  // Hamburger
  document.getElementById('navHamburger').addEventListener('click', () => {
    const s = document.getElementById('sidebar');
    s.classList.contains('mobile-open') ? closeSidebarDrawer() : openSidebarDrawer();
  });

  // Backdrop
  document.getElementById('sidebarBackdrop').addEventListener('click', closeSidebarDrawer);

  // Game list
  document.getElementById('gameList').addEventListener('click', e => {
    const row = e.target.closest('[data-game-id]');
    if (!row) return;
    if (state.activeGameId === row.dataset.gameId) { if (isMobile()) closeSidebarDrawer(); return; }
    state.activeGameId = row.dataset.gameId;
    state.activeFilter = 'all';
    renderSidebar();
    const game = getGame(state.activeGameId);
    document.getElementById('mainArea').innerHTML = renderGameView(game);
    if (isMobile()) closeSidebarDrawer();
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', e => {
    state.searchQuery = e.target.value;
    renderSidebar();
  });

  // Main area delegated
  document.getElementById('mainArea').addEventListener('click', e => {
    // Download button
    const dlBtn = e.target.closest('[data-dl-btn]');
    if (dlBtn) {
      const card = dlBtn.closest('.mod-card');
      const modData = {
        title:   card.dataset.modTitle,
        type:    card.dataset.modType,
        version: card.dataset.modVersion,
        date:    card.dataset.modDate,
      };
      openDownloadModal(modData);
      return;
    }

    // Filter rows
    const filterRow = e.target.closest('[data-filter]');
    if (filterRow) {
      state.activeFilter = filterRow.dataset.filter;
      const game = getGame(state.activeGameId);
      if (game) document.getElementById('mainArea').innerHTML = renderGameView(game);
      return;
    }

    // Game cards
    const gameCard = e.target.closest('[data-goto-game]');
    if (gameCard) { navigate('library', gameCard.dataset.gotoGame); return; }

    if (e.target.id === 'homeCta')      { navigate('library'); return; }
    if (e.target.id === 'homeAboutBtn') { navigate('about');   return; }
  });

  // Keyboard: sidebar rows
  document.getElementById('gameList').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      const row = e.target.closest('[data-game-id]');
      if (row) { e.preventDefault(); row.click(); }
    }
  });

  window.addEventListener('resize', () => { if (!isMobile()) closeSidebarDrawer(); }, { passive: true });
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
initEvents();
initParallax();
navigate('home');
